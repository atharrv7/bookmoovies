{% extends 'base.html' %}

{% block content %}
<div class="form-container">
    <div class="glass-card form-box">
        <h2>Welcome Back</h2>
        <p>Login to book your tickets</p>
        
        <form action="/login" method="POST">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required class="glass-input">
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required class="glass-input">
            </div>
            
            <button type="submit" class="btn-neon full-width">Login</button>
        </form>
        <p class="auth-link">Don't have an account? <a href="/signup">Sign up</a></p>
    </div>
</div>
{% endblock %}
