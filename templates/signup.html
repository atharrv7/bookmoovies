{% extends 'base.html' %}

{% block content %}
<div class="form-container">
    <div class="glass-card form-box signup-box">
        <h2>Join CineGlass</h2>
        <p>Create an account to discover movies</p>
        
        <form action="/signup" method="POST">
            <div class="input-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" required class="glass-input">
            </div>
            
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required class="glass-input">
            </div>
            
            <div class="input-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" required class="glass-input">
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required class="glass-input">
            </div>

            <div class="input-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required class="glass-input">
            </div>
            
            <button type="submit" class="btn-neon full-width">Sign Up</button>
        </form>
        <p class="auth-link">Already have an account? <a href="/login">Login</a></p>
    </div>
</div>
{% endblock %}
